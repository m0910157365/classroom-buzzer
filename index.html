<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課堂互動問答系統 - 老師控制面板</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ec4b6;
            --danger-color: #e71d36;
            --warning-color: #ff9f1c;
            --dark-color: #011627;
            --light-color: #f6f7f8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--light-color);
            margin: 0;
            padding: 20px;
            color: var(--dark-color);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        /* 老師控制區 */
        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-stop { background-color: var(--danger-color); color: white; }
        .btn-stop:disabled { background-color: #cca3a8; cursor: not-allowed; }

        .btn-reveal { background-color: var(--success-color); color: white; }
        .btn-reveal:disabled { background-color: #a3ccca; cursor: not-allowed; }

        .btn-reset { background-color: #6c757d; color: white; }

        /* 狀態提示列 */
        .status-bar {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 6px;
            background-color: #e9ecef;
        }

        /* 學生作答看板網格 */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* 學生卡片 */
        .student-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .student-name {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* 作答內容欄核心樣式 */
        .answer-column {
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            background-color: #f8f9fa;
            border: 1px dashed #dee2e6;
            transition: all 0.5s ease;
        }

        /* 狀態：未作答 */
        .status-unsubmitted {
            color: #6c757d;
        }

        /* 狀態：已繳交但未翻牌 */
        .status-submitted {
            color: var(--primary-color);
            animation: pulse 1.5s infinite;
        }

        /* 狀態：翻牌顯示答案 */
        .status-revealed {
            background-color: #e2f0fd;
            color: var(--primary-color);
            font-size: 28px;
            border: 2px solid var(--primary-color);
            width: 100%;
            height: 100%;
            border-radius: 8px;
            animation: flipIn 0.5s ease forwards;
        }

        /* 動畫效果 */
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        @keyframes flipIn {
            from {
                transform: rotateX(-90deg);
                opacity: 0;
            }
            to {
                transform: rotateX(0deg);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>課堂即時問答系統 (老師端模擬)</h1>
    </header>

    <div class="control-panel">
        <button id="btnStop" class="btn-stop" onclick="stopAnswering()">🛑 停止作答</button>
        <button id="btnReveal" class="btn-reveal" onclick="revealAnswers()" disabled>🃏 翻牌看答案</button>
        <button id="btnReset" class="btn-reset" onclick="resetSystem()">🔄 重設新題目</button>
    </div>

    <div id="statusBar" class="status-bar">當前狀態：🟢 學生作答中...</div>

    <div class="student-grid" id="studentGrid">
        </div>
</div>

<script>
    // 1. 模擬學生原始資料庫
    const initialStudents = [
        { id: 1, name: "王大同", hasSubmitted: true, answer: "A" },
        { id: 2, name: "李小明", hasSubmitted: true, answer: "B" },
        { id: 3, name: "張秀秀", hasSubmitted: false, answer: "" },
        { id: 4, name: "陳阿華", hasSubmitted: true, answer: "A" },
        { id: 5, name: "林志強", hasSubmitted: true, answer: "D" },
        { id: 6, name: "黃美玲", hasSubmitted: false, answer: "" }
    ];

    // 複製一份深拷貝資料供運行時操作
    let students = JSON.parse(JSON.stringify(initialStudents));

    // 2. 系統狀態變數
    let isTimeUp = false;   // 是否已停止作答
    let isRevealed = false; // 是否已翻牌

    // DOM 元件獲取
    const btnStop = document.getElementById('btnStop');
    const btnReveal = document.getElementById('btnReveal');
    const statusBar = document.getElementById('statusBar');
    const studentGrid = document.getElementById('studentGrid');

    // 3. 渲染畫面函數：根據目前狀態決定「作答內容欄」要顯示什麼
    function renderStudents() {
        studentGrid.innerHTML = ''; // 清空畫面

        students.forEach(student => {
            // 建立卡片外殼
            const card = document.createElement('div');
            card.className = 'student-card';

            // 學生姓名 HTML
            const nameDiv = document.createElement('div');
            nameDiv.className = 'student-name';
            nameDiv.innerText = student.name;
            card.appendChild(nameDiv);

            // 建立「作答內容欄」
            const answerColumn = document.createElement('div');
            answerColumn.className = 'answer-column';

            // --- 核心邏輯判斷之處 ---
            if (isTimeUp && isRevealed) {
                // 條件成立：老師停止作答且翻牌了 -> 秀出真實答案
                if (student.hasSubmitted) {
                    answerColumn.innerHTML = `<div class="status-revealed">${student.answer}</div>`;
                } else {
                    answerColumn.innerHTML = `<span class="status-unsubmitted">未作答</span>`;
                }
            } else {
                // 條件未成立：尚在作答中或還沒翻牌 -> 隱藏真實答案，只顯示狀態
                if (student.hasSubmitted) {
                    answerColumn.innerHTML = `<span class="status-submitted">📝 已繳交</span>`;
                } else {
                    answerColumn.innerHTML = `<span class="status-unsubmitted">⏳ 作答中...</span>`;
                }
            }

            card.appendChild(answerColumn);
            studentGrid.appendChild(card);
        });
    }

    // 4. 控制流程：老師點擊「停止作答」
    function stopAnswering() {
        isTimeUp = true;
        btnStop.disabled = true;
        btnReveal.disabled = false; // 啟用翻牌按鈕
        statusBar.innerText = "當前狀態：🛑 已停止作答，請點選「翻牌看答案」";
        renderStudents(); // 重新渲染畫面
    }

    // 5. 控制流程：老師點擊「翻牌」
    function revealAnswers() {
        if (!isTimeUp) return; // 安全閥：防呆確保一定要先停止作答
        isRevealed = true;
        btnReveal.disabled = true;
        statusBar.innerText = "當前狀態：🃏 已揭曉全班答案！";
        renderStudents(); // 重新渲染畫面（此時會觸發 flipIn 翻牌動畫）
    }

    // 6. 控制流程：重設系統狀態
    function resetSystem() {
        isTimeUp = false;
        isRevealed = false;
        btnStop.disabled = false;
        btnReveal.disabled = true;
        statusBar.innerText = "當前狀態：🟢 學生作答中...";
        students = JSON.parse(JSON.stringify(initialStudents)); // 還原模擬資料
        renderStudents();
    }

    // 頁面初次載入時進行第一次渲染
    renderStudents();
</script>

</body>
</html>
