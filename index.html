<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課堂即時同步搶答器</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between font-sans antialiased text-slate-800">

    <main class="flex-grow flex flex-col items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8 max-w-md w-full text-center space-y-6">
            
            <div class="mx-auto w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
                </svg>
            </div>

            <div class="space-y-2">
                <h1 class="text-2xl font-bold tracking-tight text-slate-900">課堂即時同步搶答器</h1>
                <p id="connection-status" class="text-sm font-medium text-amber-600 flex items-center justify-center gap-1.5 animate-pulse">
                    <span class="w-2 h-2 rounded-full bg-amber-500"></span>
                    正在連線至雲端伺服器...
                </p>
            </div>

            <div id="main-panel" class="bg-slate-50 rounded-2xl p-6 border border-slate-100 hidden min-h-[160px] flex flex-col justify-center">
                <div id="buzzer-display" class="text-xl font-bold text-slate-500">
                    等待學生加入...
                </div>
            </div>

            <div id="control-actions" class="hidden pt-2">
                <button id="reset-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl transition duration-200 shadow-md active:transform active:scale-[0.98] cursor-pointer">
                    重置搶答 / 開放下一題
                </button>
            </div>

            <div id="qrcode-area" class="border-t border-slate-100 pt-6 space-y-4 hidden">
                <p class="text-xs font-semibold text-slate-400 tracking-wider uppercase">學生手機掃描加入</p>
                <div class="flex justify-center">
                    <div id="qrcode" class="p-3 bg-white rounded-xl shadow-inner border border-slate-100"></div>
                </div>
                <p id="room-url" class="text-xs text-slate-400 break-all select-all hover:text-indigo-600 transition cursor-pointer"></p>
            </div>

        </div>
    </main>

    <footer class="py-4 text-center text-xs font-medium text-slate-400">
        互動教學工具系列 • 雲端即時連線版
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // 已補上精準的 databaseURL 雲端路徑
        const firebaseConfig = {
            apiKey: "AIzaSyB9E_s5Y_f8rhEdusuULFR1xMqsJL7WSo8",
            authDomain: "buzzer-15176.firebaseapp.com",
            databaseURL: "https://buzzer-15176-default-rtdb.firebaseio.com",
            projectId: "buzzer-15176",
            storageBucket: "buzzer-15176.firebasestorage.app",
            messagingSenderId: "140827507972",
            appId: "1:140827507972:web:525b30620d77b0d3aa6451"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const buzzerRef = database.ref('currentBuzzer');

        const statusEl = document.getElementById('connection-status');
        const mainPanelEl = document.getElementById('main-panel');
        const displayEl = document.getElementById('buzzer-display');
        const controlActionsEl = document.getElementById('control-actions');
        const resetBtn = document.getElementById('reset-btn');
        const qrcodeAreaEl = document.getElementById('qrcode-area');
        const roomUrlEl = document.getElementById('room-url');

        database.ref('.info/connected').on('value', (snapshot) => {
            if (snapshot.val() === true) {
                statusEl.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500"></span>雲端伺服器已同步連線';
                statusEl.className = "text-sm font-medium text-emerald-600 flex items-center justify-center gap-1.5";
                
                mainPanelEl.classList.remove('hidden');
                controlActionsEl.classList.remove('hidden');
                qrcodeAreaEl.classList.remove('hidden');
                setupQuizRoom();
            } else {
                statusEl.innerHTML = '<span class="w-2 h-2 rounded-full bg-amber-500"></span>正在連線至雲端伺服器...';
                statusEl.className = "text-sm font-medium text-amber-600 flex items-center justify-center gap-1.5 animate-pulse";
            }
        });

        function setupQuizRoom() {
            const currentUrl = window.location.href.split('?')[0];
            const studentUrl = currentUrl + "?role=student";
            roomUrlEl.innerText = studentUrl;
            
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: studentUrl,
                width: 140,
                height: 140,
                colorDark : "#1e1b4b",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            const urlParams = new URLSearchParams(window.location.search);
            const role = urlParams.get('role');

            if (role === 'student') {
                setupStudentInterface();
            } else {
                setupTeacherInterface();
            }
        }

        function setupTeacherInterface() {
            buzzerRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.user) {
                    displayEl.innerHTML = `
                        <div class="text-sm font-semibold text-indigo-500 uppercase tracking-wider mb-1">👑 搶答成功</div>
                        <div class="text-3xl font-extrabold text-slate-900">${data.user}</div>
                        <div class="text-xs text-slate-400 mt-2">時間：${new Date(data.timestamp).toLocaleTimeString()}</div>
                    `;
                    mainPanelEl.className = "bg-emerald-50 rounded-2xl p-6 border border-emerald-100 min-h-[160px] flex flex-col justify-center animate-bounce";
                } else {
                    displayEl.innerHTML = `<span class="text-slate-400">🛑 搶答尚未開放</span><br><span class="text-xs text-slate-400 block mt-2">請點擊下方按鈕開放搶答</span>`;
                    mainPanelEl.className = "bg-slate-50 rounded-2xl p-6 border border-slate-100 min-h-[160px] flex flex-col justify-center";
                }
            });

            resetBtn.addEventListener('click', () => {
                buzzerRef.set({ user: null, status: "open", timestamp: firebase.database.ServerValue.TIMESTAMP });
                displayEl.innerHTML = `<span class="text-indigo-600 animate-pulse font-semibold text-2xl block">🟢 搶答中！</span><span class="text-xs text-slate-400 block mt-1">等待學生按下按鈕...</span>`;
                mainPanelEl.className = "bg-indigo-50/50 rounded-2xl p-6 border border-indigo-100 min-h-[160px] flex flex-col justify-center";
            });
        }

        function setupStudentInterface() {
            qrcodeAreaEl.classList.add('hidden');
            controlActionsEl.classList.add('hidden');
            
            let studentName = localStorage.getItem('student_name');
            if (!studentName) {
                studentName = prompt("請輸入您的座號與姓名 (例如: 05張小明):") || "匿名同學_" + Math.floor(Math.random()*1000);
                localStorage.setItem('student_name', studentName);
            }

            displayEl.innerHTML = `
                <button id="press-buzzer-btn" class="w-32 h-32 mx-auto bg-red-500 hover:bg-red-600 active:bg-red-700 text-white font-black text-2xl rounded-full shadow-lg border-4 border-white transform active:scale-95 transition flex items-center justify-center cursor-pointer">
                    按我搶答
                </button>
                <p class="text-xs text-slate-400 mt-4">目前身分：${studentName}</p>
            `;

            setTimeout(() => {
                const pressBtn = document.getElementById('press-buzzer-btn');
                
                buzzerRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (!data || data.status !== 'open') {
                        pressBtn.disabled = true;
                        pressBtn.className = "w-32 h-32 mx-auto bg-slate-300 text-slate-400 font-bold text
