<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧課堂互動與積分系統 - 完整控制版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-800">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-xl">🎓</span>
                <h1 class="text-lg font-bold text-slate-900 tracking-tight">智慧課堂互動系統</h1>
            </div>
            <div class="flex items-center gap-3">
                <button id="view-history-btn" class="hidden bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 text-indigo-700 text-xs font-semibold px-3 py-1.5 rounded-lg transition cursor-pointer">
                    📊 歷史作答與歷程紀錄
                </button>
                <button id="end-class-btn" class="hidden bg-rose-50 hover:bg-rose-100 border border-rose-200 text-rose-600 text-xs font-semibold px-3 py-1.5 rounded-lg transition cursor-pointer">
                    🛑 結束課堂 (保留歷程)
                </button>
                <div id="connection-status" class="text-xs font-medium text-amber-600 bg-amber-50 px-3 py-1.5 rounded-full flex items-center gap-1.5 animate-pulse">
                    <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span> 雲端連線中...
                </div>
            </div>
        </div>
    </header>

    <div id="lobby-screen" class="max-w-4xl mx-auto p-6 my-8 bg-white rounded-2xl shadow-md border border-slate-200 space-y-8 hidden">
        <div class="text-center space-y-2">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">請拿出手機，掃描螢幕加入教室</h2>
            <p class="text-sm text-slate-500">進入後請輸入您的座號與姓名</p>
        </div>
        <div class="flex flex-col md:flex-row items-center justify-center gap-12 p-4">
            <div class="p-4 bg-white rounded-2xl shadow-inner border border-slate-100">
                <div id="lobby-qrcode"></div>
            </div>
            <div class="flex-1 w-full space-y-4">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-sm font-bold text-slate-700">👥 在線報到名單</span>
                        <span id="lobby-count" class="text-xs font-bold bg-indigo-600 text-white px-2.5 py-1 rounded-full">0 人已加入</span>
                    </div>
                    <div id="lobby-student-list" class="flex flex-wrap gap-2 max-h-[160px] overflow-y-auto content-start p-1">
                        <p class="text-slate-400 text-xs w-full text-center py-4">等待學生加入中...</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    <button id="start-class-confirm" class="sm:col-span-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition shadow-md cursor-pointer text-center">
                        🚪 全員到齊，進入正式教室
                    </button>
                    <button id="clear-all-data-lobby-btn" class="bg-slate-100 hover:bg-red-50 text-slate-500 hover:text-red-600 border border-slate-200 hover:border-red-200 font-medium text-xs py-3.5 rounded-xl transition cursor-pointer text-center">
                        🧹 重置分數歷程
                    </button>
                </div>
            </div>
        </div>
    </div>

    <main id="main-class-screen" class="max-w-6xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6 hidden">
        
        <div class="lg:col-span-2 space-y-6">
            
            <div id="teacher-panel" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-6 hidden">
                <div class="flex items-center justify-between border-b border-slate-100 pb-4">
                    <h2 class="text-base font-bold text-slate-900 flex items-center gap-1.5">⚡ 題目與模式控制台</h2>
                    <span class="text-xs bg-indigo-50 text-indigo-600 font-semibold px-2.5 py-1 rounded-md">教師端</span>
                </div>

                <div id="setup-question-box" class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <button id="mode-buzz" class="py-2.5 rounded-xl font-medium border text-sm transition cursor-pointer bg-indigo-50 border-indigo-200 text-indigo-700 shadow-xs">純搶答模式</button>
                    <button id="mode-single" class="py-2.5 rounded-xl font-medium border text-sm transition cursor-pointer border-slate-200 text-slate-600 hover:bg-slate-50">4選1選擇題</button>
                    <button id="mode-short" class="py-2.5 rounded-xl font-medium border text-sm transition cursor-pointer border-slate-200 text-slate-600 hover:bg-slate-50">短答/問答題</button>
                    
                    <div class="flex items-center gap-1.5 border border-slate-200 rounded-xl px-2.5 bg-slate-50">
                        <label class="text-xs font-bold text-slate-500 whitespace-nowrap">🪙 本題配分:</label>
                        <select id="score-weight" class="w-full bg-transparent text-sm font-bold text-indigo-600 focus:outline-none cursor-pointer">
                            <option value="1" selected>1 分</option>
                            <option value="2">2 分</option>
                            <option value="3">3 分</option>
                            <option value="4">4 分</option>
                            <option value="5">5 分</option>
                            <option value="6">6 分</option>
                            <option value="7">7 分</option>
                            <option value="8">8 分</option>
                            <option value="9">9 分</option>
                            <option value="10">10 分</option>
                        </select>
                    </div>
                </div>

                <div id="post-match-grading-box" class="bg-amber-50 rounded-xl p-4 border border-amber-100 space-y-3 hidden">
                    <div class="text-xs font-bold text-amber-800 flex items-center gap-1">🛑 答題已截止！請設定正確答案進行全班自動加分：</div>
                    
                    <div id="grade-single-box" class="grid grid-cols-4 gap-2 hidden">
                        <button data-ans="A" class="ans-set-btn py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:border-amber-500 transition cursor-pointer text-center">A</button>
                        <button data-ans="B" class="ans-set-btn py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:border-amber-500 transition cursor-pointer text-center">B</button>
                        <button data-ans="C" class="ans-set-btn py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:border-amber-500 transition cursor-pointer text-center">C</button>
                        <button data-ans="D" class="ans-set-btn py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:border-amber-500 transition cursor-pointer text-center">D</button>
                    </div>

                    <div id="grade-short-box" class="hidden">
                        <input type="text" id="correct-keyword" placeholder="輸入正確關鍵字 (多個可以用逗號隔開)" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-amber-500 font-medium">
                    </div>

                    <button id="submit-ans-trigger-scores" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-lg text-sm transition shadow-xs cursor-pointer mt-1">
                        📊 確認答案，全班自動計分
                    </button>
                </div>

                <div class="flex flex-col sm:flex-row gap-3">
                    <button id="start-round-btn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition shadow-sm cursor-pointer">
                        🚀 開始新題目 / 開放作答
                    </button>
                    <button id="reveal-and-grade-btn" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white font-semibold py-3 rounded-xl transition shadow-sm cursor-pointer hidden">
                        🛑 停止收件並翻牌 (學生端截止)
                    </button>
                </div>
            </div>

            <div id="student-panel" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-6 hidden">
                <div class="flex items-center justify-between border-b border-slate-100 pb-4">
                    <h2 class="text-base font-bold text-slate-900">✏️ 學生作答區</h2>
                    <span id="student-name-tag" class="text-xs bg-slate-100 text-slate-600 font-medium px-2.5 py-1 rounded-md">載入中...</span>
                </div>
                <div id="student-interface" class="min-h-[160px] flex flex-col justify-center items-center">
                    <p class="text-slate-400 text-sm">等待老師開始題目...</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4">
                <div class="flex items-center justify-between border-b border-slate-100 pb-4">
                    <h2 class="text-base font-bold text-slate-900 flex items-center gap-2">
                        ⏱️ 本題作答動態 <span id="answered-stat" class="text-xs font-normal text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md">已作答: 0人</span>
                    </h2>
                    <span id="current-mode-badge" class="text-xs bg-slate-100 text-slate-600 font-medium px-2 py-0.5 rounded-sm">純搶答</span>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="text-slate-400 border-b border-slate-100">
                                <th class="pb-2 font-medium">順序</th>
                                <th class="pb-2 font-medium">學生姓名</th>
                                <th class="pb-2 font-medium">作答內容</th>
                                <th class="pb-2 font-medium text-right" id="th-action">操作</th>
                            </tr>
                        </thead>
                        <tbody id="response-list" class="divide-y divide-slate-50">
                            <tr>
                                <td colspan="4" class="py-8 text-center text-slate-400 text-xs">目前尚無作答紀錄</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

        <div class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4">
                <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                    <h2 class="text-base font-bold text-slate-900 flex items-center gap-1.5">🏆 班級累計積分榜</h2>
                    <button id="sort-leaderboard-btn" class="text-xs bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200 font-medium px-2.5 py-1 rounded-md transition cursor-pointer">
                        📊 排序
                    </button>
                </div>
                <ol id="leaderboard" class="space-y-2 max-h-[380px] overflow-y-auto pr-1 divide-y divide-slate-50">
                    <p class="text-slate-400 text-xs text-center py-4">尚無同學登錄積分</p>
                </ol>
            </div>
        </div>
    </main>

    <div id="history-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center z-[100] hidden">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-4xl max-h-[85vh] flex flex-col m-4">
            <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between bg-slate-50 rounded-t-2xl">
                <div>
                    <h3 class="text-base font-bold text-slate-900">📊 學生學習歷程與歷史答題紀錄</h3>
                    <p class="text-xs text-slate-500 mt-0.5">點擊右側清空鈕可一鍵將此表格與積分榜同步歸零</p>
                </div>
                <div class="flex items-center gap-4">
                    <button id="clear-all-data-modal-btn" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 font-bold text-xs px-3 py-1.5 rounded-lg transition cursor-pointer">
                        🧹 清空全班分數與歷程
                    </button>
                    <button id="close-history-modal" class="text-slate-400 hover:text-slate-600 font-bold text-lg p-1 cursor-pointer">✕</button>
                </div>
            </div>
            <div class="p-6 overflow-y-auto flex-1 space-y-6">
                <div class="overflow-x-auto border border-slate-200 rounded-xl shadow-xs">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead>
                            <tr class="bg-slate-100/70 border-b border-slate-200 text-slate-600 font-semibold">
                                <th class="p-3 w-32">學生姓名</th>
                                <th class="p-3 w-24 text-indigo-600">累計總分</th>
                                <th class="p-3">歷史作答軌跡 (依出題順序由新到舊)</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body" class="divide-y divide-slate-100 text-slate-700">
                            </tbody>
                    </table>
                </div>
            </div>
            <div class="px-6 py-3.5 bg-slate-50 border-t border-slate-200 flex justify-end rounded-b-2xl">
                <button id="close-history-modal-btn" class="bg-slate-800 hover:bg-slate-900 text-white text-xs font-semibold px-4 py-2 rounded-lg transition cursor-pointer">
                    關閉視窗
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const Sound = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playStart() {
                this.init(); const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, this.ctx.currentTime);
                osc.frequency.setValueAtTime(880, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.
