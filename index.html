<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧課堂互動與積分系統 - 完美防曝光版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-800">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-xl">🎓</span>
                <h1 class="text-lg font-bold text-slate-900 tracking-tight">智慧課堂互動系統</h1>
            </div>
            <div class="flex items-center gap-3">
                <button id="end-class-btn" class="hidden bg-rose-50 hover:bg-rose-100 border border-rose-200 text-rose-600 text-xs font-semibold px-3 py-1.5 rounded-lg transition cursor-pointer">
                    🛑 結束課堂 (分數歸零)
                </button>
                <div id="connection-status" class="text-xs font-medium text-amber-600 bg-amber-50 px-3 py-1.5 rounded-full flex items-center gap-1.5 animate-pulse">
                    <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span> 雲端連線中...
                </div>
            </div>
        </div>
    </header>

    <div id="lobby-screen" class="max-w-4xl mx-auto p-6 my-8 bg-white rounded-2xl shadow-md border border-slate-200 space-y-8 hidden">
        <div class="text-center space-y-2">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">請拿出手機，掃描螢幕加入教室</h2>
            <p class="text-sm text-slate-500">進入後請輸入您的座號與姓名</p>
        </div>
        <div class="flex flex-col md:flex-row items-center justify-center gap-12 p-4">
            <div class="p-4 bg-white rounded-2xl shadow-inner border border-slate-100">
                <div id="lobby-qrcode"></div>
            </div>
            <div class="flex-1 w-full space-y-4">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-sm font-bold text-slate-700">👥 在線報到名單</span>
                        <span id="lobby-count" class="text-xs font-bold bg-indigo-600 text-white px-2.5 py-1 rounded-full">0 人已加入</span>
                    </div>
                    <div id="lobby-student-list" class="flex flex-wrap gap-2 max-h-[160px] overflow-y-auto content-start p-1">
                        <p class="text-slate-400 text-xs w-full text-center py-4">等待學生加入中...</p>
                    </div>
                </div>
                <button id="start-class-confirm" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition shadow-md cursor-pointer text-center">
                    🚪 全員到齊，進入正式教室
                </button>
            </div>
        </div>
    </div>

    <main id="main-class-screen" class="max-w-6xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6 hidden">
        
        <div class="lg:col-span-2 space-y-6">
            
            <div id="teacher-panel" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-6 hidden">
                <div class="flex items-center justify-between border-b border-slate-100 pb-4">
                    <h2 class="text-base font-bold text-slate-900 flex items-center gap-1.5">⚡ 題目與模式控制台</h2>
                    <span class="text-xs bg-indigo-50 text-indigo-600 font-semibold px-2.5 py-1 rounded-md">教師端</span>
                </div>

                <div id="setup-question-box" class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <button id="mode-buzz" class="py-2.5 rounded-xl font-medium border text-sm transition cursor-pointer bg-indigo-50 border-indigo-200 text-indigo-700 shadow-xs">純搶答模式</button>
                    <button id="mode-single" class="py-2.5 rounded-xl font-medium border text-sm transition cursor-pointer border-slate-200 text-slate-600 hover:bg-slate-50">4選1選擇題</button>
                    <button id="mode-short" class="py-2.5 rounded-xl font-medium border text-sm transition cursor-pointer border-slate-200 text-slate-600 hover:bg-slate-50">短答/問答題</button>
                    
                    <div class="flex items-center gap-1.5 border border-slate-200 rounded-xl px-2.5 bg-slate-50">
                        <label class="text-xs font-bold text-slate-500 whitespace-nowrap">🪙 本題配分:</label>
                        <select id="score-weight" class="w-full bg-transparent text-sm font-bold text-indigo-600 focus:outline-none cursor-pointer">
                            <option value="1" selected>1 分</option>
                            <option value="2">2 分</option>
                            <option value="3">3 分</option>
                            <option value="4">4 分</option>
                            <option value="5">5 分</option>
                            <option value="6">6 分</option>
                            <option value="7">7 分</option>
                            <option value="8">8 分</option>
                            <option value="9">9 分</option>
                            <option value="10">10 分</option>
                        </select>
                    </div>
                </div>

                <div id="post-match-grading-box" class="bg-amber-50 rounded-xl p-4 border border-amber-100 space-y-3 hidden animate-fadeIn">
                    <div class="text-xs font-bold text-amber-800 flex items-center gap-1">🛑 答題已截止！請在此處輸入正確答案進行系統自動計分：</div>
                    
                    <div id="grade-single-box" class="grid grid-cols-4 gap-2 hidden">
                        <button data-ans="A" class="ans-set-btn py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:border-amber-500 transition cursor-pointer">A</button>
                        <button data-ans="B" class="ans-set-btn py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:border-amber-500 transition cursor-pointer">B</button>
                        <button data-ans="C" class="ans-set-btn py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:border-amber-500 transition cursor-pointer">C</button>
                        <button data-ans="D" class="ans-set-btn py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:border-amber-500 transition cursor-pointer">D</button>
                    </div>

                    <div id="grade-short-box" class="hidden">
                        <input type="text" id="correct-keyword" placeholder="輸入正確關鍵字 (多個請用逗號隔開，例如：台灣,福爾摩沙)" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-amber-500 font-medium">
                    </div>

                    <button id="submit-ans-trigger-scores" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-lg text-sm transition shadow-xs cursor-pointer mt-1">
                        📊 確認答案，全班自動計分
                    </button>
                </div>

                <div class="flex flex-col sm:flex-row gap-3">
                    <button id="start-round-btn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition shadow-sm cursor-pointer">
                        🚀 開始新題目 / 開放作答
                    </button>
                    <button id="reveal-and-grade-btn" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white font-semibold py-3 rounded-xl transition shadow-sm cursor-pointer hidden">
                        🛑 停止收件並翻牌 (學生端截止)
                    </button>
                </div>
            </div>

            <div id="student-panel" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-6 hidden">
                <div class="flex items-center justify-between border-b border-slate-100 pb-4">
                    <h2 class="text-base font-bold text-slate-900">✏️ 學生作答區</h2>
                    <span id="student-name-tag" class="text-xs bg-slate-100 text-slate-600 font-medium px-2.5 py-1 rounded-md">載入中...</span>
                </div>
                <div id="student-interface" class="min-h-[160px] flex flex-col justify-center items-center">
                    <p class="text-slate-400 text-sm">等待老師開始題目...</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4">
                <div class="flex items-center justify-between border-b border-slate-100 pb-4">
                    <h2 class="text-base font-bold text-slate-900 flex items-center gap-2">
                        ⏱️ 本題作答動態 <span id="answered-stat" class="text-xs font-normal text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md">已作答: 0人</span>
                    </h2>
                    <span id="current-mode-badge" class="text-xs bg-slate-100 text-slate-600 font-medium px-2 py-0.5 rounded-sm">純搶答</span>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="text-slate-400 border-b border-slate-100">
                                <th class="pb-2 font-medium">順序</th>
                                <th class="pb-2 font-medium">學生姓名</th>
                                <th class="pb-2 font-medium">作答內容</th>
                                <th class="pb-2 font-medium text-right" id="th-action">操作</th>
                            </tr>
                        </thead>
                        <tbody id="response-list" class="divide-y divide-slate-50">
                            <tr>
                                <td colspan="4" class="py-8 text-center text-slate-400 text-xs">目前尚無作答紀錄</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

        <div class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4">
                <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                    <h2 class="text-base font-bold text-slate-900 flex items-center gap-1.5">🏆 班級累計積分榜</h2>
                    <button id="sort-leaderboard-btn" class="text-xs bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200 font-medium px-2.5 py-1 rounded-md transition cursor-pointer">
                        📊 依總分排序
                    </button>
                </div>
                <ol id="leaderboard" class="space-y-2 max-h-[380px] overflow-y-auto pr-1 divide-y divide-slate-50">
                    <p class="text-slate-400 text-xs text-center py-4">尚無同學登錄積分</p>
                </ol>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB9E_s5Y_f8rhEdusuULFR1xMqsJL7WSo8",
            authDomain: "buzzer-15176.firebaseapp.com",
            databaseURL: "https://buzzer-15176-default-rtdb.firebaseio.com",
            projectId: "buzzer-15176",
            storageBucket: "buzzer-15176.firebasestorage.app",
            messagingSenderId: "140827507972",
            appId: "1:140827507972:web:525b30620d77b0d3aa6451"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        const roomRef = database.ref('quizRoom');
        const responsesRef = database.ref('roomResponses');
        const scoresRef = database.ref('roomScores');
        const onlineRef = database.ref('roomOnlineStudents');

        let currentRole = 'teacher';
        let studentName = '';
        let selectedMode = 'buzz'; 
        let teacherPostAnswer = ''; 
        let roomStatus = 'lobby'; 
        let isRevealed = false; 

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('role') === 'student') {
            currentRole = 'student';
        }

        database.ref('.info/connected').on('value', (snapshot) => {
            const statusEl = document.getElementById('connection-status');
            if (snapshot.val() === true) {
                statusEl.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> 雲端連線正常';
                statusEl.className = "text-xs font-medium text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full flex items-center gap-1.5";
                initApp();
            }
        });

        function initApp() {
            roomRef.on('value', (snapshot) => {
                const room = snapshot.val();
                if (!room) {
                    if (currentRole === 'teacher') {
                        roomRef.set({ status: 'lobby', mode: 'buzz', reveal: false });
                    }
                    return;
                }
                
                roomStatus = room.status;
                isRevealed = room.reveal || false;

                if (roomStatus === 'lobby') {
                    document.getElementById('lobby-screen').classList.remove('hidden');
                    document.getElementById('main-class-screen').classList.add('hidden');
                    document.getElementById('end-class-btn').classList.add('hidden');
                    setupLobbyQR();
                } else {
                    document.getElementById('lobby-screen').classList.add('hidden');
                    document.getElementById('main-class-screen').classList.remove('hidden');
                    if (currentRole === 'teacher') {
                        document.getElementById('end-class-btn').classList.remove('hidden');
                    }
                }
            });

            if (currentRole === 'teacher') {
                document.getElementById('teacher-panel').classList.remove('hidden');
                document.getElementById('th-action').classList.remove('hidden');
                setupTeacherLogic();
            } else {
                document.getElementById('student-panel').classList.remove('hidden');
                document.getElementById('th-action').classList.add('hidden');
                setupStudentLogic();
            }

            listenToOnlineLobby();
            listenToResponses();
            listenToLeaderboard(false);
        }

        function setupLobbyQR() {
            const studentUrl = window.location.href.split('?')[0] + "?role=student";
            const container = document.getElementById("lobby-qrcode");
            if (container.children.length === 0) {
                new QRCode(container, {
                    text: studentUrl,
                    width: 220,
                    height: 220,
                    colorDark : "#0f172a",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }
        }

        function listenToOnlineLobby() {
            onlineRef.on('value', (snapshot) => {
                const listDiv = document.getElementById('lobby-student-list');
                const countSpan = document.getElementById('lobby-count');
                listDiv.innerHTML = '';
                
                if (!snapshot.exists()) {
                    listDiv.innerHTML = '<p class="text-slate-400 text-xs w-full text-center py-4">等待學生加入中...</p>';
                    countSpan.innerText = "0 人已加入";
                    return;
                }

                let count = 0;
                snapshot.forEach((child) => {
                    count++;
                    const span = document.createElement('span');
                    span.className = "bg-indigo-50 text-indigo-700 text-xs font-semibold px-3 py-1.5 rounded-lg border border-indigo-100 flex items-center gap-1 shadow-2xs";
                    span.innerHTML = `👤 ${child.key}`;
                    listDiv.appendChild(span);
                });
                countSpan.innerText = `${count} 人已加入`;
            });
        }

        /* ==========================================================================
           👨‍🏫 老師控制邏輯 (核心修正版)
           ========================================================================== */
        function setupTeacherLogic() {
            const mBuzz = document.getElementById('mode-buzz');
            const mSingle = document.getElementById('mode-single');
            const mShort = document.getElementById('mode-short');
            
            const revealBtn = document.getElementById('reveal-and-grade-btn');
            const postMatchBox = document.getElementById('post-match-grading-box');
            const gradeSingleBox = document.getElementById('grade-single-box');
            const gradeShortBox = document.getElementById('grade-short-box');
            const submitAnsBtn = document.getElementById('submit-ans-trigger-scores');

            mBuzz.onclick = () => { updateModeUI('buzz'); };
            mSingle.onclick = () => { updateModeUI('single'); };
            mShort.onclick = () => { updateModeUI('short'); };

            function updateModeUI(mode) {
                selectedMode = mode;
                [mBuzz, mSingle, mShort].forEach(btn => btn.className = "py-2.5 rounded-xl font-medium border text-sm transition cursor-pointer border-slate-200 text-slate-600 hover:bg-slate-50");
                if (mode === 'buzz') mBuzz.className = "py-2.5 rounded-xl font-medium border text-sm transition cursor-pointer bg-indigo-50 border-indigo-200 text-indigo-700 shadow-xs";
                if (mode === 'single') mSingle.className = "py-2.5 rounded-xl font-medium border text-sm transition cursor-pointer bg-indigo-50 border-indigo-200 text-indigo-700 shadow-xs";
                if (mode === 'short') mShort.className = "py-2.5 rounded-xl font-medium border text-sm transition cursor-pointer bg-indigo-50 border-indigo-200 text-indigo-700 shadow-xs";
            }

            // 大廳點擊「進入教室」
            document.getElementById('start-class-confirm').onclick = () => {
                roomRef.update({ status: 'active' });
            };

            // 1. 開始新題目 (此時完全不設定任何答案，大螢幕安全無虞)
            document.getElementById('start-round-btn').onclick = () => {
                teacherPostAnswer = ''; 
                postMatchBox.classList.add('hidden'); // 隱藏答案輸入區
                document.querySelectorAll('.ans-set-btn').forEach(b => b.className = "ans-set-btn py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:border-amber-500 transition cursor-pointer");
                document.getElementById('correct-keyword').value = '';

                responsesRef.remove(); 
                roomRef.update({
                    status: "active",
                    mode: selectedMode,
                    reveal: false,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                revealBtn.classList.remove('hidden'); 
            };

            // 2. 截止答題並翻牌 (此時學生不能再傳答案，大螢幕顯現學生作答，接著跳出答案設定框)
            revealBtn.onclick = () => {
                roomRef.update({ status: "closed", reveal: true }); // 將狀態改為已關閉答題，並開牌
                revealBtn.classList.add('hidden');

                if (selectedMode !== 'buzz') {
                    // 根據當前模式，動態亮出下方對答案的區塊
                    postMatchBox.classList.remove('hidden');
                    if (selectedMode === 'single') {
                        gradeSingleBox.classList.remove('hidden');
                        gradeShortBox.classList.add('hidden');
                    } else if (selectedMode === 'short') {
                        gradeSingleBox.classList.add('hidden');
                        gradeShortBox.classList.remove('hidden');
                    }
                }
            };

            // 選擇題答案選取
            document.querySelectorAll('.ans-set-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.ans-set-btn').forEach(b => b.className = "ans-set-btn py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:border-amber-500 transition cursor-pointer");
                    btn.className = "ans-set-btn py-2 bg-amber-500 border border-amber-500 text-white font-semibold rounded-lg text-sm transition cursor-pointer";
                    teacherPostAnswer = btn.getAttribute('data-ans');
                };
            });

            // 3. 老師此時才按下「確認答案，全班自動計分」
            submitAnsBtn.onclick = () => {
                if (selectedMode === 'short') {
                    teacherPostAnswer = document.getElementById('correct-keyword').value.trim();
                }

                if (!teacherPostAnswer && selectedMode !== 'buzz') {
                    alert('請先選擇正確答案或輸入關鍵字！');
                    return;
                }

                const currentWeight = parseInt(document.getElementById('score-weight').value) || 1;

                // 批次進行比對計分
                responsesRef.once('value', (resSnap) => {
                    resSnap.forEach((child) => {
                        const submission = child.val();
                        let isCorrect = false;

                        if (selectedMode === 'single' && submission.answer.toUpperCase() === teacherPostAnswer.toUpperCase()) {
                            isCorrect = true;
                        } else if (selectedMode === 'short') {
                            const keywords = teacherPostAnswer.split(/[,，]/).map(k => k.trim().toLowerCase());
                            isCorrect = keywords.some(kw => kw && submission.answer.toLowerCase().includes(kw));
                        }

                        if (isCorrect) {
                            scoresRef.child(submission.name).transaction(score => (score || 0) + currentWeight);
                        }
                    });
                    
                    postMatchBox.classList.add('hidden'); // 結算完成後隱藏輸入區
                    alert(`自動對答結算完成！符合者皆已自動增加 ${currentWeight} 分。`);
                });
            };

            // 結束課堂
            document.getElementById('end-class-btn').onclick = () => {
                if (confirm("確定要結束課堂嗎？這將會清空所有同學的積分並回到報到大廳！")) {
                    responsesRef.remove();
                    scoresRef.remove();
                    onlineRef.remove();
                    roomRef.set({ status: 'lobby', mode: 'buzz', reveal: false });
                }
            };

            document.getElementById('sort-leaderboard-btn').onclick = () => { listenToLeaderboard(true); };
        }

        /* ==========================================================================
           🧑‍🎓 學生作答邏輯
           ========================================================================== */
        function setupStudentLogic() {
            studentName = localStorage.getItem('student_name_v4');
            if (!studentName) {
                studentName = prompt("請輸入您的班級座號與姓名 (例如: 30105張小明):") || "學生_" + Math.floor(Math.random()*1000);
                localStorage.setItem('student_name_v4', studentName);
            }
            document.getElementById('student-name-tag').innerText = studentName;
            
            onlineRef.child(studentName).set(true);
            scoresRef.child(studentName).transaction(curr => curr || 0);

            roomRef.on('value', (snapshot) => {
                const room = snapshot.val();
                const container = document.getElementById('student-interface');
                
                if (!room || room.status === 'lobby') {
                    container.innerHTML = `<p class="text-amber-600 font-medium text-sm animate-pulse">👋 已成功進入報到大廳！請看前方大螢幕等待老師開始...</p>`;
                    return;
                }

                if (room.status === 'closed') {
                    container.innerHTML = `<p class="text-rose-500 font-bold text-sm">🛑 老師已停止收件！正在對答案與計算分數中...</p>`;
                    return;
                }

                if (room.status !== 'active') {
                    container.innerHTML = `<p class="text-slate-400 text-sm">🛑 答題尚未開放，等待老師開始...</p>`;
                    return;
                }

                responsesRef.child(studentName).on('value', (resSnap) => {
                    if (resSnap.exists()) {
                        container.innerHTML = `<div class="text-emerald-600 font-bold text-center">✓ 您的解答已送出！<br><span class="text-xs text-slate-400 font-normal">答案已加密鎖定，等待老師截止翻牌。</span></div>`;
                        return;
                    }

                    if (room.mode === 'buzz') {
                        container.innerHTML = `<button id="btn-submit-buzz" class="w-28 h-28 bg-red-500 hover:bg-red-600 active:scale-95 text-white font-black text-xl rounded-full shadow-md transition flex items-center justify-center cursor-pointer">搶答！</button>`;
                        document.getElementById('btn-submit-buzz').onclick = () => { submitAnswer('搶答成功'); };
                    } 
                    else if (room.mode === 'single') {
                        container.innerHTML = `
                            <div class="w-full space-y-3">
                                <p class="text-xs font-bold text-slate-400 text-left">請選擇您的答案：</p>
                                <div class="grid grid-cols-2 gap-3 w-full">
                                    <button onclick="submitAnswer('A')" class="py-3 bg-white border border-slate-200 rounded-xl font-bold text-slate-700 hover:bg-indigo-50 hover:border-indigo-500 transition cursor-pointer">A</button>
                                    <button onclick="submitAnswer('B')" class="py-3 bg-white border border-slate-200 rounded-xl font-bold text-slate-700 hover:bg-indigo-50 hover:border-indigo-500 transition cursor-pointer">B</button>
                                    <button onclick="submitAnswer('C')" class="py-3 bg-white border border-slate-200 rounded-xl font-bold text-slate-700 hover:bg-indigo-50 hover:border-indigo-500 transition cursor-pointer">C</button>
                                    <button onclick="submitAnswer('D')" class="py-3 bg-white border border-slate-200 rounded-xl font-bold text-slate-700 hover:bg-indigo-50 hover:border-indigo-500 transition cursor-pointer">D</button>
                                </div>
                            </div>`;
                    } 
                    else if (room.mode === 'short') {
                        container.innerHTML = `
                            <div class="w-full space-y-3">
                                <p class="text-xs font-bold text-slate-400 text-left">請輸入您的簡答：</p>
                                <div class="flex gap-2">
                                    <input type="text" id="input-short" placeholder="請在此輸入答案..." class="flex-1 bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-indigo-500">
                                    <button id="btn-submit-short" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-4 rounded-xl text-sm transition cursor-pointer">送出</button>
                                </div>
                            </div>`;
                        document.getElementById('btn-submit-short').onclick = () => {
                            const val = document.getElementById('input-short').value.trim();
                            if(!val) return alert('請先輸入答案！');
                            submitAnswer(val);
                        };
                    }
                });
            });
        }

        function submitAnswer(answerContent) {
            responsesRef.child(studentName).transaction((currentData) => {
                if (currentData === null) {
                    return {
                        name: studentName,
                        answer: answerContent,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    };
                }
                return;
            });
        }

        /* ==========================================================================
           📊 雙端共用：排序與防曝光邏輯
           ========================================================================== */
        function listenToResponses() {
            roomRef.on('value', (snap) => {
                const room = snap.val();
                const badge = document.getElementById('current-mode-badge');
                if (room) {
                    if(room.mode === 'buzz') badge.innerText = "純搶答";
                    if(room.mode === 'single') badge.innerText = "4選1選擇題";
                    if(room.mode === 'short') badge.innerText = "短答/問答題";
                }
            });

            responsesRef.orderByChild('timestamp').on('value', (snapshot) => {
                const tbody = document.getElementById('response-list');
                const statSpan = document.getElementById('answered-stat');
                tbody.innerHTML = '';

                const ansCount = snapshot.numChildren();
                statSpan.innerText = `已作答: ${ansCount} 人`;

                if (!snapshot.exists()) {
                    tbody.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-slate-400 text-xs">目前尚無作答紀錄</td></tr>`;
                    return;
                }

                let index = 1;
                snapshot.forEach((child) => {
                    const data = child.val();
                    const tr = document.createElement('tr');
                    tr.className = "text-slate-600 hover:bg-slate-50 transition";
                    
                    // 核心修正：答題尚未截止前 (isRevealed 為 false)，大螢幕一律顯示 🔒 已加密鎖定
                    let displayAnswer = "";
                    if (isRevealed) {
                        displayAnswer = `<span class="bg-indigo-50 text-indigo-700 border border-indigo-100 px-2 py-1 rounded text-xs font-mono">${data.answer}</span>`;
                    } else {
                        displayAnswer = `<span class="bg-amber-50 text-amber-600 border border-amber-100 px-2 py-1 rounded text-xs animate-pulse">🔒 已作答 (等候老師截止)</span>`;
                    }

                    const currentWeight = parseInt(document.getElementById('score-weight').value) || 1;

                    const actionTd = currentRole === 'teacher' 
                        ? `<td class="py-3 text-right"><button onclick="adjustScore('${data.name}', ${currentWeight})" class="text-xs bg-indigo-50 text-indigo-600 hover:bg-indigo-100 px-2 py-1 rounded border border-indigo-100 font-medium transition cursor-pointer">+${currentWeight} 分</button></td>`
                        : `<td class="hidden"></td>`;

                    tr.innerHTML = `
                        <td class="py-3 text-xs text-slate-400 font-mono">${index}</td>
                        <td class="py-3 font-semibold text-slate-900">${data.name}</td>
                        <td class="py-3">${displayAnswer}</td>
                        ${actionTd}
                    `;
                    tbody.appendChild(tr);
                    index++;
                });
            });
        }

        window.adjustScore = function(name, amount) {
            scoresRef.child(name).transaction(score => (score || 0) + amount);
        };

        function listenToLeaderboard(sortByScore = false) {
            scoresRef.on('value', (snapshot) => {
                const listContainer = document.getElementById('leaderboard');
                listContainer.innerHTML = '';

                if (!snapshot.exists()) {
                    listContainer.innerHTML = `<p class="text-slate-400 text-xs text-center py-4">尚無同學登錄積分</p>`;
                    return;
                }

                let students = [];
                snapshot.forEach((child) => {
                    students.push({ name: child.key, score: child.val() });
                });

                if (sortByScore) {
                    students.sort((a, b) => b.score - a.score);
                    document.getElementById('sort-leaderboard-btn').className = "text-xs bg-emerald-600 text-white font-medium px-2.5 py-1 rounded-md shadow-sm";
                } else {
                    students.sort((a, b) => a.name.localeCompare(b.name, 'zh-Hant'));
                    document.getElementById('sort-leaderboard-btn').className = "text-xs bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200 font-medium px-2.5 py-1 rounded-md transition cursor-pointer";
                }

                students.forEach((student, idx) => {
                    const li = document.createElement('li');
                    li.className = "flex items-center justify-between py-2.5 text-sm";
                    const teacherOpt = currentRole === 'teacher'
                        ? `<div class="flex items-center gap-1">
                                <button onclick="adjustScore('${student.name}', -1)" class="text-[10px] text-slate-400 hover:text-red-500 px-1 font-mono">-1</button>
                                <button onclick="adjustScore('${student.name}', 1)" class="text-[10px] text-slate-400 hover:text-emerald-500 px-1 font-mono">+1</button>
                           </div>`
                        : '';

                    li.innerHTML = `
                        <div class="flex items-center gap-2 truncate">
                            <span class="w-5 text-xs text-slate-400 font-mono text-center">${idx + 1}</span>
                            <span class="font-medium text-slate-800 truncate">${student.name}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-indigo-600 font-mono bg-indigo-50/60 px-2 py-0.5 rounded">${student.score} 分</span>
                            ${teacherOpt}
                        </div>
                    `;
                    listContainer.appendChild(li);
                });
            });
        }
    </script>
</body>
</html>
